version: '3.9'

# VPNoodles Bot — Production
# Runs alongside Remnawave panel on the same VPS.
# Only PostgreSQL + bot — no Redis needed.

services:
  postgres:
    image: postgres:16-alpine
    container_name: vpnoodles_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-vpnoodles}
      POSTGRES_USER: ${DB_USER:-vpnoodles_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'   # only localhost — not exposed to internet
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-vpnoodles_user} -d ${DB_NAME:-vpnoodles}']
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpnoodles_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
    volumes:
      - ./logs:/app/logs
    command: ['node', 'src/index.js']

volumes:
  postgres_data:
